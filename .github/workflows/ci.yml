name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    
    - name: Go build
      run: go build ./...
    
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: yarn install --frozen-lockfile
    
    - name: TypeScript check
      run: yarn typecheck
    
    - name: Lint
      run: yarn lint
    
    - name: Build frontend
      run: yarn build
    
    - name: Build Docker image
      run: docker build -t pulseops/platform:${{ github.sha }} .
    
    - name: Push to registry
      if: github.ref == 'refs/heads/main'
      run: |
        echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        docker push ghcr.io/pulseops/platform:${{ github.sha }}

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - name: Go vulnerability check
      run: go list -u -m -json all | jq -r 'select(.Update != null) | "\(.Path) \(.Version) -> \(.Update.Version)"'